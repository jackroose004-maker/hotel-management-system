name: CI — build & smoke test

# Runs on every PR into develop/main, and on direct pushes there.
# Uses a throwaway Postgres service container — never touches any real
# database, so nothing here can leak into or depend on production/dev data.
on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: hotel_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/hotel_ci
      JWT_SECRET: ci-test-secret
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      VAPID_PUBLIC_KEY: ""
      VAPID_PRIVATE_KEY: ""
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations to the throwaway CI database
        run: npx prisma migrate deploy

      - name: Build (fails the job on any TypeScript/compile error)
        run: npm run build

      - name: Run merge-gate smoke test
        run: npx jest --config ./test/jest-e2e.json --testPathPatterns smoke --forceExit --runInBand

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (fails the job on any TypeScript/compile error)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_WS_URL: ws://localhost:3001
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ""
